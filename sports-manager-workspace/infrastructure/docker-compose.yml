services:
  postgres:
    image: postgres:16-alpine
    container_name: sports-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sports}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sports123}
      POSTGRES_DB: ${POSTGRES_DB:-sports_manager}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sports-manager-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sports.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: sports-manager-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
