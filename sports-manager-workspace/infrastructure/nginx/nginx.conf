events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    # Docker's embedded DNS — re-resolves upstreams on every TTL cycle
    # instead of caching IPs at startup (fixes 502s after container restarts)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name golmanager.qzz.io *.golmanager.qzz.io;
        return 301 https://$host$request_uri;
    }

    # Main app + subdomains (portal público / admin)
    server {
        listen 443 ssl;
        server_name golmanager.qzz.io *.golmanager.qzz.io;

        ssl_certificate     /etc/letsencrypt/live/golmanager.qzz.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/golmanager.qzz.io/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Extraer subdominio y pasarlo como header
        set $subdomain "";
        if ($host ~ "^([^.]+)\.golmanager\.qzz\.io$") {
            set $subdomain $1;
        }

        # Variables force nginx to re-resolve DNS via 127.0.0.11 on each request
        set $upstream_backend  backend:3000;
        set $upstream_frontend frontend:80;

        # API → backend
        location /api/ {
            proxy_pass         http://$upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-League-Subdomain $subdomain;
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
        }

        # WebSocket
        location /socket.io/ {
            proxy_pass         http://$upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-League-Subdomain $subdomain;
            proxy_connect_timeout 5s;
            proxy_read_timeout    3600s;
        }

        # Frontend SPA
        location / {
            proxy_pass       http://$upstream_frontend;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }
}
