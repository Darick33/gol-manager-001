events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name golmanager.qzz.io *.golmanager.qzz.io;
        return 301 https://$host$request_uri;
    }

    # Main app + subdomains (portal público / admin)
    server {
        listen 443 ssl;
        server_name golmanager.qzz.io *.golmanager.qzz.io;

        ssl_certificate     /etc/letsencrypt/live/golmanager.qzz.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/golmanager.qzz.io/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API → backend
        location /api/ {
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-League-Subdomain $subdomain;
        }

        # WebSocket
        location /socket.io/ {
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-League-Subdomain $subdomain;
        }

        # Frontend SPA
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
        }

        # Extraer subdominio y pasarlo como header
        set $subdomain "";
        if ($host ~ "^([^.]+)\.golmanager\.qzz\.io$") {
            set $subdomain $1;
        }
    }
}
