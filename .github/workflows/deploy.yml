name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_backend: ${{ steps.vars.outputs.image_backend }}
      image_frontend: ${{ steps.vars.outputs.image_frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image names
        id: vars
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_backend=ghcr.io/${OWNER}/golmanager-backend" >> $GITHUB_OUTPUT
          echo "image_frontend=ghcr.io/${OWNER}/golmanager-frontend" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./sports-manager-workspace/backend-nestjs
          push: true
          tags: |
            ${{ steps.vars.outputs.image_backend }}:latest
            ${{ steps.vars.outputs.image_backend }}:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./sports-manager-workspace/frontend-react
          push: true
          tags: |
            ${{ steps.vars.outputs.image_frontend }}:latest
            ${{ steps.vars.outputs.image_frontend }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            cd /opt/golmanager/gol-manager-001
            git pull origin main
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f sports-manager-workspace/infrastructure/docker-compose.prod.yml pull
            docker compose -f sports-manager-workspace/infrastructure/docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
